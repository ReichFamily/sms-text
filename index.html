<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Voice Workspace Console</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --bg-active: #004a77;
            --text-main: #e3e3e3;
            --text-sub: #c4c7c5;
            --accent: #7a94b8;
            --border: #444746;
            --bubble-sent: #004a77;
            --bubble-received: #282a2c;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .gv-header { background: var(--bg-sidebar); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); height: 48px; z-index: 20; }
        .gv-logo-section { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 500; color: var(--text-main); }
        .gv-search-box { flex: 1; max-width: 500px; margin: 0 40px; display: flex; position: relative; }
        .gv-search-box input { width: 100%; padding: 8px 12px 8px 36px; border-radius: 20px; border: 1px solid var(--border); background-color: var(--bg-main); color: #fff; font-size: 14px; }
        .gv-search-box::before { content: "🔍"; position: absolute; left: 12px; top: 8px; font-size: 14px; color: var(--text-sub); }
        .config-inputs { display: flex; gap: 10px; }
        .config-inputs input { padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-main); color: #fff; font-size: 13px; }
        .btn-sync { background: var(--accent); color: #131314; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        .gv-sidebar { width: 320px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-action-bar { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .btn-new-message { background: #a8c7fa; color: #041e49; border: none; padding: 10px 24px; border-radius: 16px; font-weight: 500; font-size: 14px; cursor: pointer; width: 100%; text-align: center; }
        .sidebar-header { padding:10px 16px; font-size:11px; color:var(--text-sub); font-weight:bold; }
        .feed-container { flex: 1; overflow-y: auto; }
        .thread-item { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 12px; }
        .thread-item:hover { background-color: rgba(255, 255, 255, 0.04); }
        .thread-item.active { background-color: rgba(168, 199, 250, 0.14); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #444746; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 15px; text-transform: uppercase; }
        .thread-details { flex: 1; min-width: 0; }
        .thread-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .phone-display { font-size: 14px; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .timestamp-display { font-size: 11px; color: var(--text-sub); }
        .preview-snippet { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gv-chat-pane { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); position: relative; }
        .chat-pane-header { padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--bg-sidebar); display: flex; align-items: center; gap: 12px; height: 32px; }
        .active-contact-title { font-size: 16px; font-weight: 500; }
        .chat-history { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: var(--bg-main); }
        .message-row { display: flex; width: 100%; }
        .message-row.row-sent { justify-content: flex-end; }
        .message-row.row-received { justify-content: flex-start; }
        .bubble { max-width: 60%; padding: 12px 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .row-sent .bubble { background-color: var(--bubble-sent); color: #fff; border-radius: 18px 18px 0px 18px; }
        .row-received .bubble { background-color: var(--bubble-received); color: var(--text-main); border-radius: 18px 18px 18px 0px; border: 1px solid var(--border); }
        .bubble-meta { font-size: 10px; color: var(--text-sub); margin-top: 4px; display: block; text-align: right; }
        .gv-input-footer { padding: 16px 24px; background: var(--bg-main); border-top: 1px solid var(--border); }
        .input-bar-wrapper { display: flex; background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 24px; padding: 6px 12px 6px 18px; align-items: center; gap: 10px; }
        .input-bar-wrapper textarea { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: inherit; font-size: 14px; resize: none; height: 20px; line-height: 20px; }
        .btn-send-svg { background: transparent; border: none; cursor: pointer; color: var(--accent); font-size: 18px; padding: 0 6px; }
        #global-status { font-size: 11px; text-align: center; color: var(--text-sub); padding: 4px; background: #2a2a2a; border-top: 1px solid var(--border); }
        .empty-placeholder { display: flex; flex: 1; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); gap: 10px; }
        .error-banner { background: #5c1a1a; color: #ffaaaa; padding: 8px; text-align: center; font-size: 12px; margin: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="gv-header">
        <div class="gv-logo-section">💬 Google Voice Console</div>
        <div class="gv-search-box">
            <input type="text" id="searchBar" oninput="filterConversations()" placeholder="Search messages or numbers">
        </div>
        <div class="config-inputs">
            <input type="password" id="apiKey" placeholder="Telnyx API Key">
            <input type="text" id="fromNum" placeholder="Your Telnyx Number">
            <button onclick="connectWorkspace()" class="btn-sync">Connect</button>
        </div>
    </div>

    <div class="workspace">
        <div class="gv-sidebar">
            <div class="sidebar-action-bar">
                <button onclick="promptNewChat()" class="btn-new-message">+ Send new message</button>
            </div>
            <div class="sidebar-header">Messages</div>
            <div class="feed-container" id="feedBox"></div>
        </div>

        <div class="gv-chat-pane" id="chatPane">
            <div class="empty-placeholder" id="blankScreen">
                <span style="font-size: 48px;">💬</span>
                <div>No conversation selected</div>
            </div>
            <div class="chat-pane-header" id="paneHeader" style="display:none;">
                <div class="avatar" id="headerAvatar">#</div>
                <div class="active-contact-title" id="headerTitle">Line Active</div>
            </div>
            <div class="chat-history" id="messageCanvas" style="display:none;"></div>
            <div class="gv-input-footer" id="footerControls" style="display:none;">
                <div class="input-bar-wrapper">
                    <textarea id="typingBox" placeholder="Type a message..."></textarea>
                    <button id="dispatchButton" onclick="submitMessageText()" class="btn-send-svg">➔</button>
                </div>
            </div>
        </div>
    </div>

    <div id="global-status">System ready. Enter fields to sync records.</div>

    <script>
        // DIRECT Telnyx API call - NO proxy needed
        let loopTimer = null;
        let selectedContact = null;
        let masterRecordsList = [];
        let searchQuery = "";

        window.onload = function() {
            if(localStorage.getItem('gv_telnyx_key')) {
                document.getElementById('apiKey').value = localStorage.getItem('gv_telnyx_key');
                document.getElementById('fromNum').value = localStorage.getItem('gv_telnyx_from');
                connectWorkspace();
            }
        }

        async function connectWorkspace() {
            const k = document.getElementById('apiKey').value.trim();
            const f = document.getElementById('fromNum').value.trim();

            if(!k || !f) { 
                updateStatusText("❌ Need API Key and Phone Number"); 
                return; 
            }

            localStorage.setItem('gv_telnyx_key', k);
            localStorage.setItem('gv_telnyx_from', f);

            updateStatusText("🔄 Fetching messages from Telnyx...");
            
            // Clear any existing timer
            if(loopTimer) clearInterval(loopTimer);
            
            // Fetch immediately
            await fetchConsoleLogs();
            
            // Then fetch every 10 seconds
            loopTimer = setInterval(fetchConsoleLogs, 10000);
        }

        function updateStatusText(txt) { 
            document.getElementById('global-status').innerText = txt; 
        }

        async function fetchConsoleLogs() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const myNumber = document.getElementById('fromNum').value.trim();
            
            if (!apiKey || !myNumber) return;
            
            try {
                updateStatusText("📡 Calling Telnyx API...");
                
                // Direct API call to Telnyx
                const response = await fetch('/.netlify/functions/messages?page[size]=100', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 100)}`);
                }
                
                const data = await response.json();
                masterRecordsList = data.data || [];
                
                updateStatusText(`✅ Loaded ${masterRecordsList.length} messages from Telnyx`);
                
                if (masterRecordsList.length === 0) {
                    updateStatusText("⚠️ No messages found. Send a test message first.");
                }
                
                renderSidebarFeed();
                if (selectedContact) renderConversationCanvas();
                
            } catch (error) {
                console.error("Telnyx API Error:", error);
                updateStatusText(`❌ Error: ${error.message}`);
                
                // Show helpful error in the UI
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-banner';
                errorDiv.innerHTML = `⚠️ Cannot reach Telnyx API. This is a CORS error. You need to add a Netlify function proxy. <br> Error: ${error.message}`;
                
                const existingError = document.querySelector('.error-banner');
                if (!existingError && document.getElementById('feedBox').children.length === 0) {
                    document.getElementById('feedBox').appendChild(errorDiv);
                    setTimeout(() => errorDiv.remove(), 8000);
                }
            }
        }

        function renderSidebarFeed() {
            const myNum = document.getElementById('fromNum').value.trim();
            const container = document.getElementById('feedBox');
            container.innerHTML = '';

            let map = {};
            masterRecordsList.forEach(m => {
                if(!m.to || !m.to) return;
                let target = (m.from === myNum) ? m.to : m.from;
                if(!target) return;
                if(!map[target]) {
                    map[target] = { lastText: m.attributes?.text || m.text || "", time: m.attributes?.received_at || m.created_at };
                }
            });

            let sortedThreads = Object.keys(map).sort((a, b) => new Date(map[b].time) - new Date(map[a].time));

            if(searchQuery) {
                sortedThreads = sortedThreads.filter(num => 
                    num.includes(searchQuery) || map[num].lastText.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }

            if (sortedThreads.length === 0 && masterRecordsList.length > 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-sub)">No conversations found</div>';
            }

            sortedThreads.forEach(contactNum => {
                const item = document.createElement('div');
                item.className = `thread-item ${selectedContact === contactNum ? 'active' : ''}`;
                item.onclick = () => loadActiveChannel(contactNum);

                const initials = contactNum.replace('+', '').substring(0, 2);
                const stamp = new Date(map[contactNum].time).toLocaleDateString([], {month:'short', day:'numeric'});

                item.innerHTML = `
                    <div class="avatar">${initials}</div>
                    <div class="thread-details">
                        <div class="thread-meta">
                            <div class="phone-display">${contactNum}</div>
                            <div class="timestamp-display">${stamp}</div>
                        </div>
                        <div class="preview-snippet">${escapeHtml(map[contactNum].lastText)}</div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function loadActiveChannel(num) {
            selectedContact = num;
            document.getElementById('blankScreen').style.display = 'none';
            document.getElementById('paneHeader').style.display = 'flex';
            document.getElementById('messageCanvas').style.display = 'flex';
            document.getElementById('footerControls').style.display = 'block';

            document.getElementById('headerTitle').innerText = num;
            document.getElementById('headerAvatar').innerText = num.replace('+', '').substring(0,2);

            renderSidebarFeed();
            renderConversationCanvas();
        }

        function renderConversationCanvas() {
            const myNum = document.getElementById('fromNum').value.trim();
            const canvas = document.getElementById('messageCanvas');
            canvas.innerHTML = '';

            const activeTexts = masterRecordsList.filter(m => {
                const from = m.from || m.attributes?.from;
                const to = m.to || m.attributes?.to;
                if(!from || !to) return false;
                return (from === myNum && to === selectedContact) || (from === selectedContact && to === myNum);
            }).reverse();

            if (activeTexts.length === 0) {
                canvas.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-sub)">No messages yet</div>';
                return;
            }

            activeTexts.forEach(m => {
                const isSent = (m.from || m.attributes?.from) === myNum;
                const row = document.createElement('div');
                row.className = `message-row ${isSent ? 'row-sent' : 'row-received'}`;

                const text = m.attributes?.text || m.text;
                const time = m.attributes?.received_at || m.created_at;
                const clock = new Date(time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                row.innerHTML = `<div class="bubble"><div>${escapeHtml(text)}</div><span class="bubble-meta">${clock}</span></div>`;
                canvas.appendChild(row);
            });
            canvas.scrollTop = canvas.scrollHeight;
        }

        async function submitMessageText() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const fromNum = document.getElementById('fromNum').value.trim();
            const box = document.getElementById('typingBox');
            const txt = box.value.trim();
            
            if(!txt || !selectedContact) {
                updateStatusText("❌ Type a message and select a conversation");
                return;
            }

            try {
                updateStatusText("📤 Sending message...");
                
                const response = await fetch('/.netlify/functions/messages', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        from: fromNum, 
                        to: selectedContact, 
                        text: txt 
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                box.value = '';
                updateStatusText("✅ Message sent!");
                await fetchConsoleLogs(); // Refresh messages
                
            } catch(error) {
                console.error("Send error:", error);
                updateStatusText(`❌ Send failed: ${error.message}`);
            }
        }

        function filterConversations() {
            searchQuery = document.getElementById('searchBar').value.trim();
            renderSidebarFeed();
        }

        function promptNewChat() {
            const destination = prompt("Enter full destination mobile number (e.g. +12345678901):");
            if(destination && destination.trim().startsWith('+')) {
                loadActiveChannel(destination.trim());
            } else if(destination) {
                alert("Please use E.164 format with country code (e.g., +1 for US)");
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
